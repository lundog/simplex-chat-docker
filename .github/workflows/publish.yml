name: Publish image

# Builds a multi-arch (amd64 + arm64) image and pushes it to Docker Hub.
#
# Triggers:
#   - pushing a git tag like v6.5.4  -> publishes 6.5.4, 6.5, and latest
#   - manual run (workflow_dispatch) -> publishes the tag you enter
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   DOCKERHUB_USERNAME  your Docker Hub username (lundog)
#   DOCKERHUB_TOKEN     a Docker Hub access token with read/write scope

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to publish (e.g. latest or v6.5.4)"
        required: false
        default: "latest"

env:
  IMAGE: lundog/simplex-websocket-bridge

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Derive tags and labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          # Pin the image title to the binary name (otherwise it defaults to the
          # GitHub repo name, simplex-websocket-bridge-docker). Other OCI labels (source,
          # version, revision, created) are auto-derived from the repo + tag.
          labels: |
            org.opencontainers.image.title=simplex-websocket-bridge
          # latest=auto tags `latest` only for non-prerelease semver tags, and
          # skips the major.minor tag for prereleases. So v6.5.4 -> 6.5.4, 6.5,
          # latest; a hotfix v6.5.4-1 -> just 6.5.4-1 (latest/6.5 stay put).
          flavor: |
            latest=auto
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
