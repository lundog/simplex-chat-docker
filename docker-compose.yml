# docker-compose for local development / self-hosting.
#
# Copy .env.example to .env to override IMAGE, DATA_DIR, WS_PORT, or the
# pinned build-arg versions. With no .env, the defaults below are used.
#
#   docker compose up -d --build      # build locally and run
#   docker compose up -d              # pull the published image and run
#   docker compose logs -f            # follow logs
#   docker compose down               # stop and remove
#
# DATA_DIR holds the bot's profile and the file-exchange dirs, bind-mounted to
# /data (the container HOME). The profile DB and the inbound/tmp/outbound dirs
# all live under its `.simplex/` subtree on one filesystem — required for
# simplex-chat's atomic tmp->inbound rename. See README "File exchange".

services:
  simplex-chat:
    image: ${IMAGE:-lundog/simplex-chat:latest}
    build:
      # Versions and their SHA-256 pins are a matched set, bumped together in
      # the Dockerfile — not overridable here.
      context: .
    container_name: simplex-chat
    restart: unless-stopped
    ports:
      - "${WS_PORT:-5225}:5225/tcp"
    environment:
      # Applied only on first boot, when the profile is created.
      PROFILE_DISPLAY_NAME: "${PROFILE_DISPLAY_NAME:-SimpleX Bot}"
      # bot = SimpleX bot profile; human = plain SimpleX user (first boot only).
      PROFILE_PEER_TYPE: "${PROFILE_PEER_TYPE:-bot}"
      # Custom relays (space-separated). Empty = simplex-chat's public presets.
      SMP_SERVERS: "${SMP_SERVERS:-}"
      XFTP_SERVERS: "${XFTP_SERVERS:-}"
    volumes:
      # Profile DB + received-files (.simplex/files) + tmp all live under
      # /data/.simplex on one filesystem.
      - "${DATA_DIR:-./data}:/data"
      # Shared dir for SENDING files, bind-mounted verbatim (same path both
      # sides) so a sender can write a file and pass its container path. Not
      # needed to receive; the container starts fine without it. See README
      # "File exchange".
      - "${OUTBOUND_DIR:-/tmp/simplex-outbound}:${OUTBOUND_DIR:-/tmp/simplex-outbound}"
    healthcheck:
      # bash builtin /dev/tcp — no extra tooling needed in the image.
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/5225"]
      interval: 30s
      timeout: 5s
      retries: 3
      # Headroom over the entrypoint's 60s readiness wait on first boot.
      start_period: 90s
